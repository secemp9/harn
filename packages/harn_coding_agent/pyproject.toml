[project]
name = "harn"
version = "0.1.7"
requires-python = ">=3.12"
description = "AI coding assistant for the terminal with 30+ LLM providers"
readme = {file = "src/harn_coding_agent/README.md", content-type = "text/markdown"}
license = {text = "MIT"}
keywords = ["ai", "coding", "assistant", "terminal", "tui", "llm", "agent"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "harn-ai",
    "harn-agent",
    "harn-tui",
    "click>=8.1",
    "psutil>=6.1",
    "aiofiles>=24.1",
    "pathspec>=0.12",
    "wcmatch>=10.0",
    "filelock>=3.16",
    "jsonlines>=4.0",
    "ruamel.yaml>=0.18",
    "pygments>=2.18",
    "diff-match-patch>=20230430",
    "python-frontmatter>=1.1",
    "rich>=13.9",
]

[tool.uv.sources]
harn-ai = { workspace = true }
harn-agent = { workspace = true }
harn-tui = { workspace = true }

[project.scripts]
harn = "harn_coding_agent.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/harn_coding_agent"]
