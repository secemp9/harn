[project]
name = "harnify-ai"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.10",
    "jsonschema>=4.23",
    "httpx>=0.28",
    "httpx-sse>=0.4",
    "openai>=1.60",
    "anthropic>=0.45",
    "google-genai>=1.0",
    "boto3>=1.35",
    "mistralai>=1.5",
    "json-repair>=0.30",
    "websockets>=16",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
