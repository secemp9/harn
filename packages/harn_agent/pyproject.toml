[project]
name = "harn-agent"
version = "0.1.1"
requires-python = ">=3.12"
dependencies = [
    "harn-ai",
    "pydantic>=2.10",
    "aiofiles>=24.1",
    "ruamel.yaml>=0.18",
    "jsonlines>=4.0",
    "httpx>=0.28",
    "pathspec>=0.12",
]

[tool.uv.sources]
harn-ai = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/harn_agent"]
