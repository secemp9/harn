[project]
name = "harnify-coding-agent"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "harnify-ai",
    "harnify-agent",
    "harnify-tui",
    "click>=8.1",
    "psutil>=6.1",
    "aiofiles>=24.1",
    "pathspec>=0.12",
    "wcmatch>=10.0",
    "filelock>=3.16",
    "jsonlines>=4.0",
    "ruamel.yaml>=0.18",
    "pygments>=2.18",
    "diff-match-patch>=20230430",
    "python-frontmatter>=1.1",
    "rich>=13.9",
]

[tool.uv.sources]
harnify-ai = { workspace = true }
harnify-agent = { workspace = true }
harnify-tui = { workspace = true }

[project.scripts]
harnify = "harnify_coding_agent.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/harnify_coding_agent"]
