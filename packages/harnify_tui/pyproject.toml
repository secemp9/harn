[project]
name = "harnify-tui"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "blessed>=1.20",
    "markdown-it-py>=4.2",
    "rich>=13.9",
    "wcwidth>=0.2",
    "rapidfuzz>=3.10",
    "term-image>=0.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
